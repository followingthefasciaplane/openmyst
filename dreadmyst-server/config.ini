[Tcp]
; Server listen port (default from binary: 16383)
Port=16383
; Max connections
MaxConnections=500

[MySQL]
Host=127.0.0.1
Port=3306
User=root
Password=dreadmyst
Database=dreadmyst

[GameDb]
; Path to SQLite game.db (read-only template data)
Path=game.db

[SQLite]
DatabaseFile=game.db

[Server]
; Server name shown in logs
Name=Dreadmyst Server
; Tick rate in milliseconds (binary uses 100ms = 10 ticks/sec)
TickRate=100
; Max characters per account
MaxCharactersPerAccount=20

[Auth]
; Auth token validity in seconds (binary: 60)
TokenValiditySecs=60
; Auth web service URL (for token validation)
; WebServiceUrl=https://auth.dreadmyst.com/api

[Logging]
; Log level: 0=Debug, 1=Info, 2=Warn, 3=Error, 4=Fatal
Level=1
; Log to file
FileEnabled=false
FilePath=server.log

[World]
; Default map for new characters
DefaultMap=1
; Default spawn position (near first NPC cluster on fanadin)
DefaultX=78.5
DefaultY=65.5
; All Chat minimum level (from binary: 25)
AllChatMinLevel=25
